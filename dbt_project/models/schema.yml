version: 2

models:
  - name: stg_dirty_dataset_clean
    description: "Staging model that cleans and prepares the dirty_dataset_clean for further analysis."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - not_null
      - name: customer_name
        description: "Name of the customer."
        tests:
          - not_null
      - name: age
        description: "Age of the customer."
      - name: gender
        description: "Gender of the customer."
      - name: product
        description: "Product purchased by the customer."
      - name: price
        description: "Price of the product."
        tests:
          - not_null
          - accepted_values:
              values: ["0", "30000", "15000"]  # Example values
      - name: quantity
        description: "Quantity of the product purchased."
        tests:
          - not_null
      - name: order_date
        description: "Date when the order was placed."
        tests:
          - not_null
      - name: city
        description: "City where the customer resides."
      - name: payment_method
        description: "Payment method used for the purchase."

  - name: int_dirty_dataset_clean
    description: "Intermediate model that aggregates total sales by product and city."
    columns:
      - name: product
        description: "Product purchased."
      - name: city
        description: "City of the customer."
      - name: total_sales
        description: "Total sales generated from the product in the given city."
      - name: total_orders
        description: "Total number of orders for the product in the given city."
      - name: total_customers
        description: "Total unique customers who purchased the product."

  - name: mart_sales_summary
    description: "Mart model providing a summary view of total sales by city and payment method."
    columns:
      - name: city
        description: "City where the customers are located."
      - name: payment_method
        description: "Payment method used for purchases."
      - name: total_sales
        description: "Total sales amount for the city and payment method."
      - name: total_orders
        description: "Total number of orders processed for the city and payment method." 
