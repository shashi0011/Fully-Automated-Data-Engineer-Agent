version: 2

models:
  - name: stg_medical_records
    description: "Staging model for medical records. Pulls data from the raw medical records table."
    columns:
      - name: patient_id
        description: "Unique identifier for each patient."
      - name: patient_name
        description: "Full name of the patient."
      - name: age
        description: "Age of the patient in years."
      - name: gender
        description: "Gender of the patient."
      - name: diagnosis
        description: "Medical diagnosis for the patient."
      - name: treatment
        description: "Treatment received by the patient."
      - name: medication
        description: "Medication prescribed to the patient."
      - name: doctor_name
        description: "Name of the attending physician."
      - name: department
        description: "Department where the treatment was administered."
      - name: hospital
        description: "Name of the hospital."
      - name: admission_date
        description: "Date of patient admission."
      - name: discharge_date
        description: "Date of patient discharge."
      - name: treatment_cost
        description: "Total cost of treatment."
      - name: recovery_status
        description: "Current recovery status of the patient."

  - name: int_medical_records
    description: "Intermediate model that aggregates treatment costs by department."
    columns:
      - name: department
        description: "Department of treatment."
      - name: total_treatment_cost
        description: "Total treatment costs for the department."
      - name: patient_count
        description: "Number of patients treated in the department."
      - name: average_treatment_cost
        description: "Average treatment cost per patient in the department."

  - name: mart_medical_records_analysis
    description: "Final mart model that summarizes patient demographics and treatment costs by gender."
    columns:
      - name: gender
        description: "Gender of the patients."
      - name: patient_count
        description: "Total number of patients per gender."
      - name: total_treatment_cost
        description: "Total treatment costs per gender."
      - name: average_treatment_cost
        description: "Average treatment cost per patient by gender."