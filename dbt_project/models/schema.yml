version: 2

models:
  - name: stg_dirty_sales
    description: "Staged sales data with cleaned and validated columns."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
      - name: name
        description: "Name of the customer."
      - name: age
        description: "Age of the customer (in years)."
      - name: gender
        description: "Gender of the customer."
      - name: product
        description: "Product purchased."
      - name: price
        description: "Price of the product."
      - name: quantity
        description: "Quantity of the product purchased."
      - name: date
        description: "Date of the order." 
      - name: city
        description: "City where the order was made."
      - name: payment
        description: "Payment method used for the order."

  - name: int_dirty_sales
    description: "Intermediate model calculating total sales per order."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
      - name: total_sale
        description: "Total sale amount for each order."

  - name: mart_sales_summary
    description: "Summary of sales data by city."
    columns:
      - name: city
        description: "City where the orders were made."
      - name: total_orders
        description: "Total number of unique orders per city."
      - name: total_revenue
        description: "Total revenue generated per city."
      - name: average_order_value
        description: "Average revenue per order in each city."