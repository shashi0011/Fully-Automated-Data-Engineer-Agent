<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Background -->
  <rect width="400" height="200" fill="#0f172a"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradDF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Icon: Hexagon (Data + Forge concept) -->
  <polygon points="100,40 140,70 140,120 100,150 60,120 60,70"
           fill="url(#gradDF)" stroke="#38bdf8" stroke-width="2"/>

  <!-- Inner Circuit Lines -->
  <line x1="100" y1="70" x2="100" y2="120" stroke="#0f172a" stroke-width="3"/>
  <circle cx="100" cy="70" r="5" fill="#0f172a"/>
  <circle cx="100" cy="120" r="5" fill="#0f172a"/>

  <!-- Project Name -->
  <text x="180" y="95" fill="#ffffff" font-size="28" font-family="Arial, sans-serif" font-weight="bold">
    DATAFORGE
  </text>

  <!-- AI Highlight -->
  <text x="180" y="130" fill="#38bdf8" font-size="20" font-family="Arial, sans-serif">
    AI
  </text>

</svg>